        // 刪除日記
        async function deleteDiary() {
            if (currentEditingId === null) {
                alert('沒有正在編輯的日記！');
                return;
            }

            // 確認刪除
            if (!confirm('確定要刪除這篇日記嗎？此操作無法復原！')) {
                return;
            }

            // 找到要刪除的日記
            const index = diaries.findIndex(d => d.id === currentEditingId);
            if (index >= 0) {
                // 先保存被刪除日記的信息（用於更新標籤使用次數）
                const deletedDiary = diaries[index];
                
                // 從 Supabase 刪除
                if (USE_SUPABASE) {
                    await supabaseRequest('diaries', 'DELETE', null, `?id=eq.${currentEditingId}`);
                }
                
                // 從數組中移除
                diaries.splice(index, 1);
                
                // 更新標籤使用次數（減少被刪除日記的標籤使用次數）
                if (deletedDiary && deletedDiary.tags) {
                    const userId = getUserId();
                    deletedDiary.tags.forEach(async tag => {
                        if (tagUsage[tag] && tagUsage[tag] > 0) {
                            tagUsage[tag] -= 1;
                            if (tagUsage[tag] === 0) {
                                delete tagUsage[tag];
                                // 從 Supabase 刪除標籤
                                if (USE_SUPABASE) {
                                    await supabaseRequest('tag_usage', 'DELETE', null, `?user_id=eq.${userId}&tag_name=eq.${tag}`);
                                }
                            } else {
                                // 更新 Supabase 標籤計數
                                if (USE_SUPABASE) {
                                    await supabaseRequest('tag_usage', 'PATCH', {
                                        usage_count: tagUsage[tag]
                                    }, `?user_id=eq.${userId}&tag_name=eq.${tag}`);
                                }
                            }
                        }
                    });
                }
                
                // 儲存到localStorage（作為備份）
                localStorage.setItem('diaries', JSON.stringify(diaries));
                localStorage.setItem('tagUsage', JSON.stringify(tagUsage));
                
                // 清空編輯區域
                cancelEdit();
                
                // 更新顯示
                renderDiaryList();
                updateTagsList();
                
                showToast('日記已刪除！', 'success');
            }
        }

        // 編輯日記（從日記列表中的編輯按鈕觸發）
        function editDiary(id, event) {

        // 搜尋功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.trim();
            const searchTermLower = searchTerm.toLowerCase();
            
            // 如果搜索框被清空，清除標籤搜索
            if (!searchTerm) {
                currentSearchTag = null;
                const checklistFilterButtons = document.getElementById('checklistFilterButtons');
                if (checklistFilterButtons) {
                    checklistFilterButtons.style.display = 'none';
                }
                checklistFilter = 'all'; // 重置篩選
                renderDiaryList();
                updateTagsList(); // 更新標籤樣式
                setDiaryListLoadingState(USE_SUPABASE ? (hasMoreDiaries ? '往下滾動可載入更多' : '已載入全部日記') : '');
                return;
            }

            // 清除標籤搜索狀態（搜尋框輸入時不再使用特殊標籤搜尋）
            currentSearchTag = null;
            updateTagsList(); // 更新標籤樣式

            // 檢查是否搜尋 checklist（顯示篩選按鈕）
            const checklistKeywords = ['checklist', '待辦', '待辦清單', '清單', '📋', '☐', '☑', '- [', '- [x]', '- [ ]'];
            const isSearchingChecklist = checklistKeywords.some(keyword => searchTermLower.includes(keyword) || searchTerm.includes(keyword));
            const checklistFilterButtons = document.getElementById('checklistFilterButtons');
            if (isSearchingChecklist) {
                if (checklistFilterButtons) {
                    checklistFilterButtons.style.display = 'flex';
                }
            } else {
                if (checklistFilterButtons) {
                    checklistFilterButtons.style.display = 'none';
                }
                checklistFilter = 'all'; // 重置篩選
            }

            // 將搜尋字串按空格分割成多個關鍵字（空格代表 AND）
            const allKeywords = searchTermLower.split(/\s+/).filter(keyword => keyword.length > 0);
            
            // 分離正常關鍵字和排除關鍵字（以 ! 開頭）
            const includeKeywords = []; // 必須包含的關鍵字
            const excludeKeywords = []; // 不能包含的關鍵字（以 ! 開頭）
            
            allKeywords.forEach(keyword => {
                if (keyword.startsWith('!')) {
                    // 移除 ! 前綴
                    const excludeKeyword = keyword.substring(1);
                    if (excludeKeyword.length > 0) {
                        excludeKeywords.push(excludeKeyword);
                    }
                } else {
                    includeKeywords.push(keyword);
                }
            });

            // 統一使用普通文字搜尋，一律當成普通字符處理
            const filteredDiaries = diaries.filter(diary => {
                // 搜尋日記內容（直接字串匹配，包含 #標籤名 等所有字符）
                const contentLower = (diary.content || '').toLowerCase();
                // 搜尋翻譯內容
                const translationLower = (diary.translation || '').toLowerCase();
                
                // 合併內容和翻譯用於搜尋
                const searchableText = contentLower + ' ' + translationLower;
                
                // 檢查是否同時包含所有正常關鍵字（AND 邏輯）
                const allIncludeMatch = includeKeywords.length === 0 || includeKeywords.every(keyword => {
                    return searchableText.includes(keyword);
                });
                
                // 檢查是否不包含任何排除關鍵字（NOT 邏輯）
                const allExcludeMatch = excludeKeywords.every(keyword => {
                    return !searchableText.includes(keyword);
                });
                
                return allIncludeMatch && allExcludeMatch;
            });
            
            // 傳遞所有關鍵字用於高亮（只高亮正常關鍵字，不高亮排除關鍵字）
            renderFilteredDiaries(filteredDiaries, includeKeywords);
            setDiaryListLoadingState('');
        });

        // 無限滾動：接近頁面底部時載入下一頁日記
        window.addEventListener('scroll', function() {
            if (!USE_SUPABASE || !hasMoreDiaries || isLoadingMoreDiaries) return;

        // 渲染過濾後的日記列表

            let sortedDiaries = [...filteredDiaries].sort((a, b) => b.date.localeCompare(a.date));

            // 如果顯示 checklist 篩選，應用篩選邏輯
            const checklistFilterButtons = document.getElementById('checklistFilterButtons');
            if (checklistFilterButtons && checklistFilterButtons.style.display !== 'none') {
                sortedDiaries = sortedDiaries.filter(diary => {
                    if (!hasChecklist(diary.content)) {
                        return false; // 只顯示有 checklist 的日記
                    }
                    
                    const status = getChecklistStatus(diary.content);
                    
                    if (checklistFilter === 'all') {
                        return true;
                    } else if (checklistFilter === 'completed') {
                        // 只顯示所有項目都完成的 checklist
                        return status.total > 0 && status.completed === status.total;
                    } else if (checklistFilter === 'pending') {
                        // 只顯示有未完成項目的 checklist
                        return status.pending > 0;
                    }
                    return true;
                });
            }

            diaryList.innerHTML = sortedDiaries.map(diary => {
                // 使用自定義函數格式化日期，避免時區轉換問題
                const date = formatDateString(diary.date);
                
                // 檢查是否有 checklist
                const hasChecklistItems = hasChecklist(diary.content);
                const checklistIcon = hasChecklistItems ? ' 📋' : '';

                // 轉換 checklist 為可交互的 HTML（如果有 checklist）
                let contentHtml;
                if (hasChecklistItems) {
                    // 對於有 checklist 的內容，先轉換 checklist，然後高亮非 checklist 部分
                    contentHtml = convertChecklistToHTML(diary.content, diary.id);
                    // 對非 checklist 部分進行高亮（這需要更複雜的處理，暫時先不處理高亮）
                } else {
                    // 沒有 checklist，直接高亮
                    contentHtml = highlightText(diary.content, keywords);
                }
                
                let highlightedTranslation = diary.translation ? highlightText(diary.translation, keywords) : '';

                const tagsHtml = diary.tags.map(tag => 
                    `<span class="diary-item-tag">#${tag}</span>`
                ).join('');

                const imagesHtml = diary.images && diary.images.length > 0 ? `
                    <div class="diary-item-images">
                        ${diary.images.map(img => `<img src="${img}" alt="日記圖片" class="diary-item-image" loading="lazy" onclick="window.open('${img}', '_blank')">`).join('')}
                    </div>
                ` : '';
                
                return `
                    <div class="diary-item">
                        <div class="diary-item-header">
                            <div class="diary-item-date">${date}${checklistIcon}</div>
                            <button class="diary-item-edit-btn" onclick="editDiary(${diary.id}, event)">✏️ 編輯</button>
                        </div>
                        <div class="diary-item-content">${contentHtml}</div>
                        ${highlightedTranslation ? `<div class="diary-item-content" style="color: #666; font-style: italic; margin-top: 8px;">${highlightedTranslation}</div>` : ''}
                        ${imagesHtml}
                        ${tagsHtml ? `<div class="diary-item-tags">${tagsHtml}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // 高亮文字（支持多個關鍵字）
        function highlightText(text, keywords) {
            if (!keywords || (Array.isArray(keywords) && keywords.length === 0)) {
                return escapeHtml(text);
            }
            
            // 如果 keywords 是字符串，轉換為數組
            const keywordArray = Array.isArray(keywords) ? keywords : [keywords];
            
            // 先轉義 HTML
            let highlightedText = escapeHtml(text);
            
            // 對每個關鍵字進行高亮
            keywordArray.forEach(keyword => {
                if (keyword && keyword.trim()) {
                    const regex = new RegExp(`(${escapeRegex(keyword.trim())})`, 'gi');
                    highlightedText = highlightedText.replace(regex, '<span class="highlight">$1</span>');
                }
            });
            
            return highlightedText;
        }

        // 轉義HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 轉義正則表達式特殊字符
        function escapeRegex(text) {
            return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 將日記內容中的 checklist 轉換為可交互的 HTML
        function convertChecklistToHTML(content, diaryId) {
            // 匹配 ☐ 或 ☑ 符號，也支持舊格式 `- [ ]` 或 `- [x]`
            const lines = content.split('\n');
            let html = '';
            let checklistIndex = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // 匹配新格式：☐ 或 ☑ 開頭的行
                let checklistMatch = line.match(/^(\s*)(☐|☑)\s*(.+)$/);
                // 如果沒有匹配，嘗試舊格式
                if (!checklistMatch) {
                    checklistMatch = line.match(/^(\s*)- \[([ x])\]\s*(.+)$/);
                }
                
                if (checklistMatch) {
                    // 這是 checklist 項目
                    // 移除所有縮進，讓它貼齊左側
                    let checked = false;
                    let text = '';
                    
                    // 判斷是新格式還是舊格式
                    if (checklistMatch[2] === '☑') {
                        checked = true;
                        text = checklistMatch[3].trim(); // 移除文字前後的空白
                    } else if (checklistMatch[2] === '☐') {
                        checked = false;
                        text = checklistMatch[3].trim(); // 移除文字前後的空白
                    } else {
                        // 舊格式
                        checked = checklistMatch[2] === 'x';
                        text = checklistMatch[3].trim(); // 移除文字前後的空白
                    }
                    
                    const checkboxId = `checklist-${diaryId}-${checklistIndex}`;
                    const checkedAttr = checked ? 'checked' : '';
                    const completedClass = checked ? 'completed' : '';
                    
                    html += `<div class="checklist-item ${completedClass}">
<input type="checkbox" id="${checkboxId}" ${checkedAttr} onchange="toggleChecklistItem(${diaryId}, ${i}, this.checked)">
<span class="checklist-item-text">${escapeHtml(text)}</span>
</div>`;
                    // 如果不是最後一行，添加換行
                    if (i < lines.length - 1) {
                        html += '<br>';
                    }
                    checklistIndex++;
                } else {
                    // 普通文字
                    html += escapeHtml(line);
                    if (i < lines.length - 1) {
                        html += '<br>';
                    }
                }
            }
            
            return html;
        }

        // 切換 checklist 項目的完成狀態
        async function toggleChecklistItem(diaryId, lineIndex, checked) {
            const diary = diaries.find(d => d.id === diaryId);
            if (!diary) return;
            
            const content = diary.content;
            const lines = content.split('\n');
            
            // 更新指定行的 checklist 狀態
            if (lineIndex >= 0 && lineIndex < lines.length) {
                const line = lines[lineIndex];
                // 先嘗試匹配新格式（☐ 或 ☑）
                let checklistMatch = line.match(/^(\s*)(☐|☑)\s*(.+)$/);
                
                if (checklistMatch) {
                    // 新格式 - 移除縮進，貼齊左側
                    const text = checklistMatch[3].trim(); // 移除文字前後的空白
                    const newSymbol = checked ? '☑' : '☐';
                    lines[lineIndex] = `${newSymbol} ${text}`;
                } else {
                    // 嘗試舊格式
                    checklistMatch = line.match(/^(\s*)- \[([ x])\]\s*(.+)$/);
                    if (checklistMatch) {
                        const text = checklistMatch[3].trim(); // 移除文字前後的空白
                        // 轉換為新格式，移除縮進
                        const newSymbol = checked ? '☑' : '☐';
                        lines[lineIndex] = `${newSymbol} ${text}`;
                    }
                }
            }
            
            // 更新日記內容
            const newContent = lines.join('\n');
            diary.content = newContent;
            
            // 同步到 Supabase
            if (USE_SUPABASE) {
                await supabaseRequest('diaries', 'PATCH', {
                    content: newContent
                }, `?id=eq.${diaryId}`);
            }
            
            // 儲存到 localStorage
            localStorage.setItem('diaries', JSON.stringify(diaries));
            
            // 重新渲染日記列表
            renderDiaryList();
        }

        // Checklist 篩選功能
        function filterChecklist(filter) {
            checklistFilter = filter;
            const buttons = document.querySelectorAll('.checklist-filter-btn');
            buttons.forEach((btn, index) => {
                btn.classList.remove('active');
                if ((filter === 'all' && index === 0) || 
                    (filter === 'completed' && index === 1) || 
                    (filter === 'pending' && index === 2)) {
                    btn.classList.add('active');
                }
            });
            
            // 重新渲染日記列表
            renderDiaryList();
        }

        // 檢查日記是否有 checklist
        function hasChecklist(content) {
            // 支持新格式（☐ 或 ☑）和舊格式（- [ ] 或 - [x]）
            return /^\s*(☐|☑)\s*.+$/m.test(content) || /^\s*- \[[ x]\]\s*.+$/m.test(content);
        }

        // 檢查日記的 checklist 狀態
        function getChecklistStatus(content) {
            // 支持新格式和舊格式
            const checklistRegex = /^\s*(☐|☑|- \[([ x])\])\s*(.+)$/gm;
            let match;
            let total = 0;
            let completed = 0;
            
            while ((match = checklistRegex.exec(content)) !== null) {
                total++;
                // 檢查是否完成
                if (match[1] === '☑' || match[2] === 'x') {
                    completed++;
                }
            }
            
            return { total, completed, pending: total - completed };
        }
    </script>
</body>
